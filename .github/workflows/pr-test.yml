name: PR Test

on:
  pull_request:
    branches: [ "develop" ]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        id: test
        run: ./gradlew :api:test
        continue-on-error: true

      - name: 라인 커버리지 추출
        id: coverage
        if: always()
        run: |
          REPORT="api/build/reports/jacoco/test/jacocoTestReport.xml"
          if [ -f "$REPORT" ]; then
            LINE=$(grep -o 'type="LINE" missed="[0-9]*" covered="[0-9]*"' "$REPORT" | tail -1)
            MISSED=$(echo "$LINE" | grep -o 'missed="[0-9]*"' | grep -o '[0-9]*')
            COVERED=$(echo "$LINE" | grep -o 'covered="[0-9]*"' | grep -o '[0-9]*')
            TOTAL=$((MISSED + COVERED))
            PCT=$(awk "BEGIN { printf \"%.1f\", ($COVERED/$TOTAL)*100 }")
            echo "pct=$PCT" >> "$GITHUB_OUTPUT"
            echo "covered=$COVERED" >> "$GITHUB_OUTPUT"
            echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi

      - name: PR 커버리지 댓글
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const outcome  = '${{ steps.test.outcome }}';
            const available = '${{ steps.coverage.outputs.available }}' === 'true';
            const pct     = '${{ steps.coverage.outputs.pct }}';
            const covered = '${{ steps.coverage.outputs.covered }}';
            const total   = '${{ steps.coverage.outputs.total }}';

            let body;
            if (!available) {
              body = '## 테스트 결과\n\n❌ 테스트 실행에 실패했습니다 (빌드 오류).';
            } else if (outcome === 'success') {
              body = `## 테스트 결과\n\n✅ 모든 테스트 통과\n\n| 지표 | 커버리지 |\n|---|---|\n| 라인 커버리지 | **${pct}%** (${covered} / ${total} 라인) |`;
            } else {
              body = `## 테스트 결과\n\n❌ 테스트 실패\n\n| 지표 | 커버리지 |\n|---|---|\n| 라인 커버리지 | **${pct}%** (${covered} / ${total} 라인) |`;
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
