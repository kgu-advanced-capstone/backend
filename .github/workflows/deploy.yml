name: Java 21 CI/CD with Azure MySQL

on:
  push:
    branches: [ "main", "feat/**", "feature/**" ]

jobs:
  # 빌드 단계: 모든 브랜치에서 실행
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean :api:bootJar

  # 배포 단계: 오직 main 브랜치일 때만 실행
  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/my-api .
          docker push ${{ secrets.DOCKER_USERNAME }}/my-api

      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 폴더 생성 및 이동
            mkdir -p ~/app && cd ~/app
            
            # 환경변수 파일(.env) 동적 생성
            echo "SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}" > .env
            echo "SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
            echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
            echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env

            # 최신 이미지 반영 및 재시작
            docker compose pull
            docker compose up -d
            
            # 오래된 이미지 정리
            docker image prune -f