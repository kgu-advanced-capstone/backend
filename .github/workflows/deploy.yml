name: Java 21 CI/CD with Azure MySQL

on:
  push:
    branches: [ "main", "feat/**", "feature/**" ]

jobs:
  # 빌드 단계: 모든 브랜치에서 실행
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew clean :api:bootJar

  # 배포 단계: 오직 main 브랜치일 때만 실행
    # 빌드와 배포를 하나로 합친 최종 스크립트
  deploy:
      if: github.ref == 'refs/heads/main'
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4

        # 1. 자바 설정 (빌드를 위해 필요)
        - name: Set up JDK 21
          uses: actions/setup-java@v4
          with:
            java-version: '21'
            distribution: 'temurin'
            cache: gradle

        # 2. 프로젝트 빌드 (여기서 JAR 파일이 생성됨)
        - name: Build with Gradle
          run: |
            chmod +x gradlew
            ./gradlew clean :api:bootJar -x test

        # 3. 도커 로그인
        - name: Login to Docker Hub
          uses: docker/login-action@v3
          with:
            username: ${{ secrets.DOCKER_USERNAME }}
            password: ${{ secrets.DOCKER_PASSWORD }}

        # 4. 도커 이미지 빌드 및 푸시 (이제 JAR 파일이 같은 환경에 있어서 성공함)
        - name: Build and push Docker image
          run: |
            docker build -t ${{ secrets.DOCKER_USERNAME }}/my-api .
            docker push ${{ secrets.DOCKER_USERNAME }}/my-api

        # 5. VM에 접속해서 배포
        - name: Deploy to Azure VM
          uses: appleboy/ssh-action@master
          with:
            host: ${{ secrets.SERVER_HOST }}
            username: ${{ secrets.SSH_USERNAME }}
            key: ${{ secrets.SSH_PRIVATE_KEY }}
            script: |
              mkdir -p ~/app && cd ~/app
              
              echo "SPRING_DATASOURCE_URL=${{ secrets.DB_URL }}" > .env
              echo "SPRING_DATASOURCE_USERNAME=${{ secrets.DB_USERNAME }}" >> .env
              echo "SPRING_DATASOURCE_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
              echo "DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}" >> .env
              echo "GCLOUD_RW_API_KEY=${{ secrets.GCLOUD_RW_API_KEY }}" >> .env  # grafana alloy api 키
              docker compose pull
              docker compose up -d
              docker image prune -f