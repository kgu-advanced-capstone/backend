spring:
  application:
    name: api
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini
  datasource:
    url: jdbc:mysql://localhost:3306/mydatabase?serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: root
    password: password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  data:
    redis:
      host: localhost
      port: 6379

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:local-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:local-client-secret}
            scope:
              - email
              - profile

  autoconfigure:
    exclude:
      - io.awspring.cloud.autoconfigure.s3.S3AutoConfiguration

sentry:
  enabled: false

# 로컬 전용 JWT 시크릿 — 운영 환경에서는 반드시 환경 변수로 주입
jwt:
  secret: local-dev-secret-key-32-characters-long
  expiration-ms: 3600000

oauth2:
  redirect-uri: http://localhost:3000/oauth2/callback

cloud:
  aws:
    s3:
      endpoint: ${SUPABASE_S3_ENDPOINT}
      path-style-access-enabled: true
    region:
      static: ${SUPABASE_S3_REGION:ap-southeast-1}
      auto: false
    credentials:
      access-key: ${SUPABASE_S3_ACCESS_KEY}
      secret-key: ${SUPABASE_S3_SECRET_KEY}
    stack:
      auto: false

storage:
  s3:
    bucket: ${SUPABASE_S3_BUCKET}
    endpoint: ${SUPABASE_S3_ENDPOINT}
  local:
    root-dir: ./uploads
    base-url: http://pcserver.cloud/files
