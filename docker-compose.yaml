version: '3.8'

services:
  # 1. MySQL 설정
  local-db:
    image: mysql:8.0
    container_name: local-mysql
    restart: always
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: mydatabase
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: user
      MYSQL_PASSWORD: userpass
    volumes:
      - ./docker/mysql/data:/var/lib/mysql

  # 2. Redis 설정
  local-redis:
    image: redis:latest
    container_name: local-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ./docker/redis/data:/data